apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress
  namespace: argocd
spec:
  project: llm-inference
  source:
    repoURL: https://github.com/knickkennedy/k8s-llm-inference-stack
    targetRevision: HEAD
    path: environments/dev/ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
