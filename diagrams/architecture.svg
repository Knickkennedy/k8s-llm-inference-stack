    <line x1="160" y1="0" x2="160" y2="680" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="680" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="680" stroke="white" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="680" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="680" stroke="white" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="680" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="680" stroke="white" stroke-width="1"/>
    <line x1="440" y1="0" x2="440" y2="680" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="680" stroke="white" stroke-width="1"/>
    <line x1="520" y1="0" x2="520" y2="680" stroke="white" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="680" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="680" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="680" stroke="white" stroke-width="1"/>
    <line x1="680" y1="0" x2="680" y2="680" stroke="white" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="680" stroke="white" stroke-width="1"/>
    <line x1="760" y1="0" x2="760" y2="680" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="680" stroke="white" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="680" stroke="white" stroke-width="1"/>
    <line x1="880" y1="0" x2="880" y2="680" stroke="white" stroke-width="1"/>
    <line x1="920" y1="0" x2="920" y2="680" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="680" stroke="white" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold" letter-spacing="3">k8s-llm-inference-stack</text>
  <text x="500" y="52" text-anchor="middle" fill="#6e7681" font-size="10" letter-spacing="2">ARCHITECTURE OVERVIEW</text>
  <line x1="200" y1="60" x2="800" y2="60" stroke="#30363d" stroke-width="1"/>

  <!-- ── GITHUB (top left) ── -->
  <rect x="30" y="80" width="140" height="70" rx="6" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
  <text x="100" y="102" text-anchor="middle" fill="#6e7681" font-size="8" letter-spacing="2">SOURCE</text>
  <text x="100" y="120" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">GitHub</text>
  <text x="100" y="137" text-anchor="middle" fill="#6e7681" font-size="9">knickkennedy/</text>
  <text x="100" y="149" text-anchor="middle" fill="#6e7681" font-size="9">k8s-llm-inference-stack</text>

  <!-- ── ARGOCD (top center) ── -->
  <rect x="420" y="80" width="160" height="70" rx="6" fill="url(#nodeGrad)" stroke="#bc8cff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="500" y="102" text-anchor="middle" fill="#bc8cff" font-size="8" letter-spacing="2">GITOPS</text>
  <text x="500" y="120" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">ArgoCD</text>
  <text x="500" y="137" text-anchor="middle" fill="#8b949e" font-size="9">App of Apps Pattern</text>
  <text x="500" y="149" text-anchor="middle" fill="#8b949e" font-size="9">Kustomize Overlays</text>

  <!-- ── DEVELOPER (top right) ── -->
  <rect x="830" y="80" width="140" height="70" rx="6" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
  <text x="900" y="102" text-anchor="middle" fill="#6e7681" font-size="8" letter-spacing="2">CLIENT</text>
  <text x="900" y="120" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">API Consumer</text>
  <text x="900" y="137" text-anchor="middle" fill="#6e7681" font-size="9">OpenAI-compatible</text>
  <text x="900" y="149" text-anchor="middle" fill="#6e7681" font-size="9">REST API</text>

  <!-- GitHub → ArgoCD arrow (git poll) -->
  <line x1="170" y1="115" x2="418" y2="115" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <rect x="240" y="103" width="90" height="16" rx="3" fill="#0d1117"/>
  <text x="285" y="114" text-anchor="middle" fill="#bc8cff" font-size="9">git poll / sync</text>

  <!-- k3s Cluster boundary -->
  <rect x="20" y="175" width="960" height="470" rx="8" fill="none" stroke="#21262d" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="30" y="168" width="100" height="16" rx="3" fill="#0d1117"/>
  <text x="80" y="180" text-anchor="middle" fill="#6e7681" font-size="10" letter-spacing="2">k3s CLUSTER</text>

  <!-- ── CP1 - Control Plane (Raspberry Pi) ── -->
  <rect x="40" y="195" width="190" height="180" rx="6" fill="url(#cpGrad)" stroke="#21262d" stroke-width="1.5"/>
  <rect x="40" y="195" width="190" height="24" rx="6" fill="#21262d"/>
  <rect x="40" y="207" width="190" height="12" fill="#21262d"/>
  <text x="135" y="212" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold" letter-spacing="1">cp1 · control-plane</text>
  <text x="135" y="228" text-anchor="middle" fill="#6e7681" font-size="8">Raspberry Pi 4 · ARM64 · 8GB</text>

  <!-- ArgoCD box inside cp1 -->
  <rect x="55" y="238" width="160" height="40" rx="4" fill="#1c2128" stroke="#bc8cff" stroke-width="1"/>
  <text x="135" y="253" text-anchor="middle" fill="#bc8cff" font-size="10" font-weight="bold">ArgoCD</text>
  <text x="135" y="267" text-anchor="middle" fill="#6e7681" font-size="8">Cluster Controller</text>

  <!-- Traefik box inside cp1 -->
  <rect x="55" y="288" width="160" height="40" rx="4" fill="#1c2128" stroke="#f0883e" stroke-width="1"/>
  <text x="135" y="303" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">Traefik</text>
  <text x="135" y="317" text-anchor="middle" fill="#6e7681" font-size="8">Ingress Controller</text>

  <!-- CoreDNS box inside cp1 -->
  <rect x="55" y="338" width="160" height="28" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="135" y="356" text-anchor="middle" fill="#8b949e" font-size="9">CoreDNS · kube-proxy</text>

  <!-- ── CP2 - Inference Node ── -->
  <rect x="260" y="195" width="350" height="420" rx="6" fill="url(#cpGrad)" stroke="#3fb950" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="260" y="195" width="350" height="24" rx="6" fill="#1a2d1a"/>
  <rect x="260" y="207" width="350" height="12" fill="#1a2d1a"/>
  <text x="435" y="212" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold" letter-spacing="1">cp2 · inference</text>
  <text x="435" y="228" text-anchor="middle" fill="#6e7681" font-size="8">Mini PC · AMD64 · 8GB RAM</text>

  <!-- ollama namespace box -->
  <rect x="275" y="238" width="320" height="360" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="290" y="253" fill="#6e7681" font-size="8" letter-spacing="1">namespace: ollama</text>

  <!-- Ollama pod -->
  <rect x="285" y="262" width="300" height="200" rx="4" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="390" y="278" text-anchor="middle" fill="#3fb950" font-size="9" letter-spacing="1">POD: ollama</text>

  <!-- Ollama container -->
  <rect x="295" y="285" width="130" height="80" rx="3" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="360" y="301" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">Ollama</text>
  <text x="360" y="315" text-anchor="middle" fill="#6e7681" font-size="8">Mistral 7B Q4</text>
  <text x="360" y="327" text-anchor="middle" fill="#6e7681" font-size="8">port: 11434</text>
  <text x="360" y="340" text-anchor="middle" fill="#6e7681" font-size="8">4.4GB model</text>
  <text x="360" y="352" text-anchor="middle" fill="#6e7681" font-size="8">OLLAMA_KEEP_ALIVE: 24h</text>

  <!-- Metrics sidecar container -->
  <rect x="440" y="285" width="135" height="80" rx="3" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="507" y="301" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">ollama-metrics</text>
  <text x="507" y="315" text-anchor="middle" fill="#6e7681" font-size="8">sidecar proxy</text>
  <text x="507" y="327" text-anchor="middle" fill="#6e7681" font-size="8">port: 8080</text>
  <text x="507" y="340" text-anchor="middle" fill="#6e7681" font-size="8">captures tokens,</text>
  <text x="507" y="352" text-anchor="middle" fill="#6e7681" font-size="8">latency, requests</text>

  <!-- Arrow between containers inside pod -->
  <line x1="425" y1="325" x2="440" y2="325" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- PVC -->
  <rect x="295" y="378" width="130" height="36" rx="3" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="360" y="393" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="bold">PVC: ollama-data</text>
  <text x="360" y="406" text-anchor="middle" fill="#6e7681" font-size="8">20Gi · local-path</text>

  <!-- Model pull job -->
  <rect x="295" y="428" width="295" height="36" rx="3" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="442" y="443" text-anchor="middle" fill="#bc8cff" font-size="9" font-weight="bold">Job: ollama-pull-mistral</text>
  <text x="442" y="456" text-anchor="middle" fill="#6e7681" font-size="8">PostSync hook · idempotent model warmup</text>

  <!-- Service -->
  <rect x="295" y="478" width="295" height="36" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="442" y="493" text-anchor="middle" fill="#8b949e" font-size="9" font-weight="bold">Service: ollama · ClusterIP</text>
  <text x="442" y="506" text-anchor="middle" fill="#6e7681" font-size="8">:11434 → sidecar:8080 · :8080 → metrics</text>

  <!-- ── CP3 - Observability Node ── -->
  <rect x="640" y="195" width="330" height="420" rx="6" fill="url(#cpGrad)" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="640" y="195" width="330" height="24" rx="6" fill="#1a1f2e"/>
  <rect x="640" y="207" width="330" height="12" fill="#1a1f2e"/>
  <text x="805" y="212" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold" letter-spacing="1">cp3 · observability</text>
  <text x="805" y="228" text-anchor="middle" fill="#6e7681" font-size="8">Mini PC · AMD64 · 8GB RAM</text>

  <!-- monitoring namespace -->
  <rect x="655" y="238" width="300" height="360" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="670" y="253" fill="#6e7681" font-size="8" letter-spacing="1">namespace: monitoring</text>

  <!-- Prometheus -->
  <rect x="665" y="262" width="275" height="100" rx="4" fill="#1c2128" stroke="#f0883e" stroke-width="1.5"/>
  <text x="802" y="278" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">Prometheus</text>
  <text x="802" y="293" text-anchor="middle" fill="#6e7681" font-size="8">port: 9090 · NodePort: 30900</text>
  <text x="802" y="308" text-anchor="middle" fill="#6e7681" font-size="8">scrape interval: 60s · retention: 7d</text>
  <!-- PVC -->
  <rect x="675" y="320" width="120" height="28" rx="3" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="735" y="333" text-anchor="middle" fill="#58a6ff" font-size="8">PVC: 10Gi</text>
  <text x="735" y="344" text-anchor="middle" fill="#6e7681" font-size="7">local-path</text>

  <!-- Grafana -->
  <rect x="665" y="378" width="275" height="100" rx="4" fill="#1c2128" stroke="#f0883e" stroke-width="1.5"/>
  <text x="802" y="394" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">Grafana</text>
  <text x="802" y="409" text-anchor="middle" fill="#6e7681" font-size="8">port: 3000 · NodePort: 30300</text>
  <text x="802" y="424" text-anchor="middle" fill="#6e7681" font-size="8">Provisioned dashboards · ConfigMap</text>
  <!-- PVC -->
  <rect x="675" y="436" width="120" height="28" rx="3" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="735" y="449" text-anchor="middle" fill="#58a6ff" font-size="8">PVC: 5Gi</text>
  <text x="735" y="460" text-anchor="middle" fill="#6e7681" font-size="7">local-path</text>

  <!-- RBAC badge -->
  <rect x="800" y="436" width="130" height="28" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="865" y="449" text-anchor="middle" fill="#8b949e" font-size="8">ClusterRole + Binding</text>
  <text x="865" y="460" text-anchor="middle" fill="#6e7681" font-size="7">node/pod discovery</text>

  <!-- Service row -->
  <rect x="665" y="492" width="275" height="36" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="802" y="507" text-anchor="middle" fill="#8b949e" font-size="9" font-weight="bold">Services: NodePort</text>
  <text x="802" y="520" text-anchor="middle" fill="#6e7681" font-size="8">Prometheus :30900 · Grafana :30300</text>

  <!-- ── FLOW ARROWS ── -->

  <!-- ArgoCD → cp1/ArgoCD (deploys itself reference) -->
  <line x1="500" y1="150" x2="500" y2="185" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="500" y1="185" x2="135" y2="185" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="135" y1="185" x2="135" y2="193" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowPurple)"/>

  <!-- ArgoCD → cp2 (deploys ollama) -->
  <line x1="500" y1="150" x2="500" y2="170" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="500" y1="170" x2="435" y2="170" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="435" y1="170" x2="435" y2="193" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGreen)"/>

  <!-- ArgoCD → cp3 (deploys monitoring) -->
  <line x1="500" y1="150" x2="500" y2="170" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="500" y1="170" x2="805" y2="170" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="805" y1="170" x2="805" y2="193" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>

  <!-- Prometheus scrapes ollama sidecar -->
  <line x1="655" y1="312" x2="580" y2="312" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="590" y="300" width="55" height="14" rx="2" fill="#0d1117"/>
  <text x="617" y="310" text-anchor="middle" fill="#f0883e" font-size="8">scrape</text>

  <!-- Grafana queries Prometheus -->
  <line x1="802" y1="378" x2="802" y2="362" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- API Consumer → Traefik (routed below the top boxes) -->
  <line x1="900" y1="150" x2="900" y2="163" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="900" y1="163" x2="230" y2="163" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="520" y="153" width="100" height="14" rx="3" fill="#0d1117"/>
  <text x="570" y="163" text-anchor="middle" fill="#58a6ff" font-size="9">HTTP request</text>

  <!-- Traefik → Ollama service -->
  <line x1="135" y1="328" x2="135" y2="560" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="135" y1="560" x2="294" y2="560" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>

  <!-- ── LEGEND ── -->
  <rect x="30" y="620" width="940" height="48" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="50" y="637" fill="#6e7681" font-size="8" letter-spacing="1">LEGEND</text>

  <line x1="110" y1="633" x2="145" y2="633" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="150" y="637" fill="#8b949e" font-size="9">GitOps sync</text>

  <line x1="230" y1="633" x2="265" y2="633" stroke="#3fb950" stroke-width="1.5"/>
  <text x="270" y="637" fill="#8b949e" font-size="9">Inference path</text>

  <line x1="360" y1="633" x2="395" y2="633" stroke="#f0883e" stroke-width="1.5"/>
  <text x="400" y="637" fill="#8b949e" font-size="9">Metrics scrape</text>

  <line x1="490" y1="633" x2="525" y2="633" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="530" y="637" fill="#8b949e" font-size="9">API / query</text>

  <text x="50" y="657" fill="#6e7681" font-size="8" letter-spacing="1">STACK</text>
  <text x="110" y="657" fill="#8b949e" font-size="9">k3s v1.34 · ArgoCD · Ollama · Mistral 7B Q4 · Prometheus · Grafana · Traefik · Kustomize</text>
</svg>
