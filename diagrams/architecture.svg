    <line x1="0" y1="80" x2="1000" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="120" x2="1000" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1000" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1000" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="280" x2="1000" y2="280" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1000" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="360" x2="1000" y2="360" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1000" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="440" x2="1000" y2="440" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1000" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="520" x2="1000" y2="520" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1000" y2="560" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1000" y2="600" stroke="white" stroke-width="1"/>
    <line x1="0" y1="640" x2="1000" y2="640" stroke="white" stroke-width="1"/>
