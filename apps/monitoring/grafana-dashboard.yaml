apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ollama
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ollama-dashboard.json: |
    {
      "title": "Ollama LLM Inference",
      "uid": "ollama-inference",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Models Loaded",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-uid" },
          "targets": [{
            "expr": "sum(ollama_loaded_models)",
            "legendFormat": "Models"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Mistral RAM Usage (MB)",
          "type": "gauge",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-uid" },
          "targets": [{
            "expr": "sum(ollama_model_ram_mb{model=\"mistral:latest\"})",
            "legendFormat": "RAM (MB)"
          }],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 8192,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 5000 },
                  { "color": "red", "value": 7000 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Mistral Status",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-uid" },
          "targets": [{
            "expr": "max(ollama_model_loaded{model=\"mistral:latest\"})",
            "legendFormat": "Mistral 7B"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "mappings": [
              {
                "type": "value",
                "options": {
                  "0": { "text": "● Unloaded", "color": "red" },
                  "1": { "text": "● Loaded", "color": "green" }
                }
              }
            ]
          }
        },
        {
          "id": 7,
          "title": "Cumulative Tokens Generated",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-uid" },
          "targets": [{
            "expr": "sum(ollama_generated_tokens_total)",
            "legendFormat": "Total Tokens"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [{ "color": "blue", "value": 0 }]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Request Duration p50 / p95 / p99 (seconds)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 16, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus-uid" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(ollama_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(ollama_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(ollama_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        }
      ]
    }
